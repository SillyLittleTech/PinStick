name: Create Prerelease on PR Ready

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review
    paths:
      - '.github/workflows/prerelease.yml'
      - '.github/scripts/**'
      - '**.swift'
      - '**.png'
      - 'Contents.json'
      - 'Jot.xcodeproj.zip'
      - 'cross-platform/**'

jobs:
  create-prerelease:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Xcode project
        id: extract
        run: |
          VERSION=$(.github/scripts/extract-version.sh)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build macOS App
        run: |
          unzip -o Jot.xcodeproj.zip -d .
          mkdir -p build

          xcodebuild build \
            -project Jot.xcodeproj \
            -target Jot \
            -configuration Release \
            -skipPackagePluginValidation \
            SYMROOT=build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH=$(find build -name "PinStick.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ PinStick.app not found"
            exit 1
          fi

          OUT_ZIP="$(pwd)/build/PinStick.app.zip"
          APP_DIR="$(dirname "$APP_PATH")"
          APP_NAME="$(basename "$APP_PATH")"
          ( cd "$APP_DIR" && zip -r "$OUT_ZIP" "$APP_NAME" )
          echo "✅ macOS build succeeded"

      - name: Create Prerelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract.outputs.version }}-prerelease-${{ github.run_number }}
          name: "PinStick ${{ steps.extract.outputs.version }} - Prerelease (PR #${{ github.event.pull_request.number }})"
          body: |
            🧪 **Prerelease Build** from PR #${{ github.event.pull_request.number }}

            **Branch:** ${{ github.event.pull_request.head.ref }}
            **Author:** @${{ github.event.pull_request.user.login }}

            This is a prerelease build. Testing and feedback welcome!
          draft: false
          prerelease: true
          files: ./build/PinStick.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cross-platform-build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.4"
          channel: "stable"

      - name: Generate Flutter platforms
        working-directory: cross-platform/flutter
        run: |
          flutter create . --platforms=macos,windows,linux --project-name pinstick_cross

      - name: Install Flutter dependencies
        working-directory: cross-platform/flutter
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: cross-platform/flutter
        run: flutter test

      - name: Build Flutter app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: cross-platform/flutter
        run: flutter build linux --release

      - name: Build Flutter app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: cross-platform/flutter
        run: flutter build windows --release

      - name: Build Flutter app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: cross-platform/flutter
        run: flutter build macos --release
