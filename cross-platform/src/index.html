<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinStick</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="left">
        <button id="pin-btn" type="button" title="Pin window" aria-label="Pin window">📌</button>
      </div>
      <div class="right">
        <span id="status">Ready</span>
      </div>
    </header>
    <main>
      <div id="note-surface" class="note-surface">
        <textarea
          id="note"
          placeholder="Type your notes here… or double-click to add media."
          autofocus
        ></textarea>
        <div id="media-stage" class="media-stage" aria-live="polite" hidden></div>
        <input type="file" id="media-file-input" accept="image/*,video/*" hidden />
      </div>
    </main>
    <script src="./main.js" defer></script>
  </body>
</html>
