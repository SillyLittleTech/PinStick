<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinStick</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="left">
        <button id="pin-btn" type="button" title="Pin window" aria-label="Pin window">📌</button>
      </div>
      <div class="right">
        <span id="status">Ready</span>
      </div>
    </header>
    <main>
      <textarea id="note" placeholder="Type your notes here..." autofocus></textarea>
      <section id="media-preview-panel" aria-live="polite">
        <h2>Embedded media</h2>
        <div id="media-preview"></div>
      </section>
    </main>
    <script src="./main.js" defer></script>
  </body>
</html>
