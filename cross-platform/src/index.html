<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinStick</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="left">
        <button id="pin-btn" type="button" title="Pin window" aria-label="Pin window">📌</button>
      </div>
      <div class="right">
        <span id="status">Ready</span>
      </div>
    </header>
    <main>
      <textarea id="note" placeholder="Type your notes here..." autofocus></textarea>
    </main>
    <div id="close-dialog" class="dialog-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="dialog-msg">
      <div class="dialog-box">
        <p id="dialog-msg">Heads up! Your data will be cached to this app. Is that okay?</p>
        <div class="dialog-buttons">
          <button id="dialog-yea" type="button">Yea</button>
          <button id="dialog-nah" type="button">Nah</button>
        </div>
      </div>
    </div>
    <script src="./main.js" defer></script>
  </body>
</html>
